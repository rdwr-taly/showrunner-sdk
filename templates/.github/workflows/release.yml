name: Manual Release Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The version to release (e.g., 1.2.3)'
        required: true
        type: string
      tag_as_latest:
        description: "Tag this release as 'latest' as well?"
        required: true
        type: boolean
        default: false
      changelog:
        description: 'Brief description of this release'
        required: false
        type: string
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      DOCKER_IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare Docker tags
        id: prep_tags
        run: |
          TAGS="${DOCKER_IMAGE_NAME}:${{ github.event.inputs.version }}"
          if [[ "${{ github.event.inputs.tag_as_latest }}" == 'true' ]]; then
            TAGS="${TAGS}
          ${DOCKER_IMAGE_NAME}:latest"
          fi
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "${TAGS}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.prep_tags.outputs.tags }}

      # ── ShowRunner release tracking ──
      - name: Update .showrunner/release.json
        run: |
          mkdir -p .showrunner
          cat > .showrunner/release.json << RELEASE_EOF
          {
            "image": "${DOCKER_IMAGE_NAME}:${{ github.event.inputs.version }}",
            "version": "${{ github.event.inputs.version }}",
            "is_latest": ${{ github.event.inputs.tag_as_latest }},
            "released_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "changelog": "${{ github.event.inputs.changelog }}"
          }
          RELEASE_EOF

      - name: Commit release info
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .showrunner/release.json
          git diff --staged --quiet && echo "No changes" || git commit -m "release: v${{ github.event.inputs.version }}" && git push
